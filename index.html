  <div id="modal-container" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4">

        </button>
      </div>

      <form id="course-form" onsubmit="saveCourse(event)" class="space-y-4">
        <input type="hidden" id="form-course-id">
        <div>
          <label class="text-[10px] text-slate-400 font-bold block mb-1">รหัสวิชา</label>
          <input type="text" id="form-code" placeholder="เช่น DDT-201" class="w-full text-xs p-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 uppercase" required>
        </div>

        <div>
          <label class="text-[10px] text-slate-400 font-bold block mb-1">ชื่อรายวิชา</label>
          <input type="text" id="form-name" placeholder="เช่น การออกแบบประสบการณ์ผู้ใช้" class="w-full text-xs p-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500" required>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[10px] text-slate-400 font-bold block mb-1">หน่วยกิต</label>

              <option value="3/2">เทอม 3/2</option>

          <button type="submit" class="w-1/2 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-xs font-bold transition shadow-md">บันทึกข้อมูล</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let activeTab = 'dashboard';
    
    const INITIAL_COURSES = [
      { id: '1', code: 'GE-101', name: 'ทักษะภาษาไทยเพื่อการสื่อสารดิจิทัล', credits: 3, grade: 'A', category: 'GE-Thai', term: '1/1' },
      { id: '2', code: 'GE-112', name: 'ภาษาอังกฤษเพื่อการสื่อสารสากล', credits: 3, grade: 'B+', category: 'GE-English', term: '1/1' },
      { id: '3', code: 'GE-121', name: 'นวัตกรรมและเทคโนโลยีสีเขียว', credits: 3, grade: 'A', category: 'GE-Sci', term: '1/1' },
      { id: '4', code: 'DDT-101', name: 'ประวัติศาสตร์และการออกแบบดิจิทัล', credits: 3, grade: 'A', category: 'Core', term: '1/1' },
      { id: '5', code: 'DDT-102', name: 'องค์ประกอบศิลป์สำหรับสื่อดิจิทัล', credits: 3, grade: 'B', category: 'Core', term: '1/1' },
      { id: '6', code: 'GE-131', name: 'คณิตศาสตร์สำหรับคอมพิวเตอร์กราฟิก', credits: 3, grade: 'A', category: 'GE-Math', term: '1/2' },
      { id: '7', code: 'GE-142', name: 'จิตวิทยาสังคมในยุคดิจิทัล', credits: 3, grade: 'B+', category: 'GE-Social', term: '1/2' },
      { id: '8', code: 'DDT-103', name: 'การคิดเชิงออกแบบและการสื่อสารแบรนด์', credits: 3, grade: 'A', category: 'Core', term: '1/2' },
      { id: '9', code: 'DDT-104', name: 'หลักการโปรแกรมมิ่งสร้างสรรค์ (Creative Coding)', credits: 3, grade: 'C+', category: 'Core', term: '1/2' },
      { id: '10', code: 'GE-151', name: 'สุนทรียศาสตร์และการคิดสร้างสรรค์', credits: 3, grade: 'A', category: 'GE-Human', term: '2/1' },
      { id: '11', code: 'DDT-201', name: 'การออกแบบประสบการณ์ผู้ใช้ (UI/UX Design)', credits: 3, grade: 'A', category: 'Major-Compulsory', term: '2/1' },
      { id: '12', code: 'DDT-202', name: 'การสร้างแบบจำลอง 3 มิติเชิงดิจิทัล (3D Modeling)', credits: 3, grade: 'B', category: 'Major-Compulsory', term: '2/1' },
      { id: '13', code: 'DDT-203', name: 'การพัฒนาเว็บเทคโนโลยีขั้นสูง', credits: 3, grade: 'A', category: 'Major-Compulsory', term: '2/1' },
      { id: '14', code: 'DDT-204', name: 'แอนิเมชันและการออกแบบเคลื่อนไหว (Motion Design)', credits: 3, grade: 'A', category: 'Major-Compulsory', term: '2/2' },
      { id: '15', code: 'DDT-205', name: 'การออกแบบเกมและปฏิสัมพันธ์ (Interaction Design)', credits: 3, grade: 'B+', category: 'Major-Compulsory', term: '2/2' },
      { id: '16', code: 'DDT-E01', name: 'ศิลปะสร้างสรรค์ด้วยปัญญาประดิษฐ์ (AI Creative Tools)', credits: 3, grade: 'A', category: 'Major-Elective', term: '2/2' },
    ];

    const MAJOR_COMPULSORY_REQUIREMENTS = [
      { code: 'DDT-201', name: 'การออกแบบประสบการณ์ผู้ใช้ (UI/UX Design)', credits: 3 },
      { code: 'DDT-202', name: 'การสร้างแบบจำลอง 3 มิติเชิงดิจิทัล (3D Modeling)', credits: 3 },
      { code: 'DDT-203', name: 'การพัฒนาเว็บเทคโนโลยีขั้นสูง', credits: 3 },
      { code: 'DDT-204', name: 'แอนิเมชันและการออกแบบเคลื่อนไหว (Motion Design)', credits: 3 },
      { code: 'DDT-205', name: 'การออกแบบเกมและปฏิสัมพันธ์ (Interaction Design)', credits: 3 },
      { code: 'DDT-301', name: 'การออกแบบสื่อและเนื้อหาดิจิทัลขั้นสูง', credits: 3 },
      { code: 'DDT-302', name: 'การออกแบบสภาพแวดล้อมเสมือนจริง (VR/AR Design)', credits: 3 },
      { code: 'DDT-303', name: 'การจัดการโครงการออกแบบและทรัพย์สินทางปัญญา', credits: 3 },
      { code: 'DDT-304', name: 'เตรียมฝึกงานและทักษะวิชาชีพ', credits: 1 },
      { code: 'DDT-401', name: 'โครงงานออกแบบดิจิทัลและเทคโนโลยี 1 (Capstone Project I)', credits: 3 },
      { code: 'DDT-402', name: 'โครงงานออกแบบดิจิทัลและเทคโนโลยี 2 (Capstone Project II)', credits: 3 },
      { code: 'DDT-403', name: 'ฝึกปฏิบัติงานวิชาชีพออกแบบดิจิทัล (Internship)', credits: 6 },
    ];

    const GRADE_POINTS = {
      'A': 4.0, 'B+': 3.5, 'B': 3.0, 'C+': 2.5, 'C': 2.0, 'D+': 1.5, 'D': 1.0, 'F': 0.0, 'W': null
    };

    let courses = JSON.parse(localStorage.getItem('ddt_html_courses')) || INITIAL_COURSES;
    let profile = JSON.parse(localStorage.getItem('ddt_html_profile')) || {
      studentId: '66010916024',
      avatar: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=256'
    };

    function saveToLocalStorage() {
      localStorage.setItem('ddt_html_courses', JSON.stringify(courses));
      localStorage.setItem('ddt_html_profile', JSON.stringify(profile));
    }

    function calculateStats() {
      let totalPoints = 0;
      let totalGPAXCredits = 0;
      let totalEarnedCredits = 0;
      let hasF = false;

      const categoryCredits = {
        'GE-Thai': 0, 'GE-English': 0, 'GE-Sci': 0, 'GE-Math': 0, 'GE-Social': 0, 'GE-Human': 0,
        'Core': 0, 'Major-Compulsory': 0, 'Major-Elective': 0, 'Free-Elective': 0
      };

      courses.forEach(c => {
        const p = GRADE_POINTS[c.grade];
        const cred = Number(c.credits);
        
        if (c.grade === 'F') hasF = true;
        if (p !== null && c.grade !== 'W') {
          totalPoints += p * cred;
          totalGPAXCredits += cred;
        }
        if (c.grade !== 'F' && c.grade !== 'W') {
          totalEarnedCredits += cred;
          categoryCredits[c.category] = (categoryCredits[c.category] || 0) + cred;
        }
      });

      const gpax = totalGPAXCredits > 0 ? (totalPoints / totalGPAXCredits).toFixed(2) : '0.00';
      let honors = 'ไม่มีคาดการณ์เกียรตินิยม';
      if (Number(gpax) >= 3.75 && !hasF) honors = 'เกียรตินิยมอันดับ 1 🏆';
      else if (Number(gpax) >= 3.25 && Number(gpax) < 3.75 && !hasF) honors = 'เกียรตินิยมอันดับ 2 🥈';

      const geTotal = (categoryCredits['GE-Thai'] || 0) + (categoryCredits['GE-English'] || 0) + (categoryCredits['GE-Sci'] || 0) + 
                      (categoryCredits['GE-Math'] || 0) + (categoryCredits['GE-Social'] || 0) + (categoryCredits['GE-Human'] || 0);

      return {
        gpax, totalEarnedCredits, hasF, honors, categoryCredits, geTotal,
        core: categoryCredits['Core'] || 0,
        majorComp: categoryCredits['Major-Compulsory'] || 0,
        majorEle: categoryCredits['Major-Elective'] || 0,
        free: categoryCredits['Free-Elective'] || 0
      };
    }

    function calculateTermGPA(term) {
      const termCourses = courses.filter(c => c.term === term);
      let totalPoints = 0;
      let totalCredits = 0;
      termCourses.forEach(c => {
        const p = GRADE_POINTS[c.grade];
        if (p !== null && c.grade !== 'W') {
          totalPoints += p * Number(c.credits);
          totalCredits += Number(c.credits);
        }
      });
      return totalCredits > 0 ? (totalPoints / totalCredits).toFixed(2) : '0.00';
    }

    function switchTab(tabId) {
      activeTab = tabId;
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.remove('text-emerald-600', 'scale-105', 'font-bold');
        el.classList.add('text-slate-400');
      });
      const activeNav = document.getElementById(`nav-${tabId}`);
      if(activeNav) activeNav.classList.add('text-emerald-600', 'scale-105', 'font-bold');
      renderContent();
    }

    function renderHeader() {
      document.getElementById('profile-display-id').textContent = profile.studentId;
      document.getElementById('profile-display-avatar').src = profile.avatar;
    }

    function renderContent() {
      const main = document.getElementById('app-content');
      const stats = calculateStats();

      if (activeTab === 'dashboard') {
        const minVal = 1;
        const gpa1 = calculateTermGPA('1/1');
        const gpa2 = calculateTermGPA('1/2');
        const gpa3 = calculateTermGPA('2/1');
        const gpa4 = calculateTermGPA('2/2');

        // ป้องกันค่าลบหรือ NaN ที่จะทำให้ SVG พัง
        const y1 = 110 - (Math.max(0, gpa1 - minVal)) * 30;
        const y2 = 110 - (Math.max(0, gpa2 - minVal)) * 30;
        const y3 = 110 - (Math.max(0, gpa3 - minVal)) * 30;
        const y4 = 110 - (Math.max(0, gpa4 - minVal)) * 30;

        main.innerHTML = `
          <div class="space-y-5 animate-fade-in">
            <div class="bg-gradient-to-r from-emerald-600 to-teal-700 rounded-3xl p-5 text-white shadow-xl relative overflow-hidden">
              <div class="flex justify-between items-start">
                <div>
                  <p class="text-emerald-100 text-xs tracking-wider uppercase font-medium">เกรดเฉลี่ยสะสม (GPAX)</p>
                  <h1 class="text-5xl font-extrabold tracking-tight mt-1 font-inter">${stats.gpax}</h1>
                </div>
                <div class="bg-white/15 backdrop-blur-md px-3 py-1.5 rounded-full text-[11px] font-semibold flex items-center gap-1.5">
                  <span class="w-2 h-2 rounded-full bg-emerald-300 animate-pulse"></span>
                  หน่วยกิตสะสม: ${stats.totalEarnedCredits}/133 นก.
                </div>
              </div>
              <div class="mt-5 pt-4 border-t border-white/10 flex justify-between items-center text-sm">
                <span class="flex items-center gap-1"><span class="text-emerald-300">✦</span> คาดการณ์เกียรตินิยม:</span>
                <span class="font-bold px-3 py-1 rounded-full text-xs ${stats.honors.includes('1') ? 'bg-amber-400 text-slate-900 shadow' : 'bg-white/15'}">
                  ${stats.honors}
                </span>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
              <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col justify-between">
                <span class="text-xs text-slate-500 font-medium">หน่วยกิตขาดอยู่</span>
                <div class="mt-2 flex items-baseline gap-1">
                  <span class="text-2xl font-bold text-slate-800 font-inter">${Math.max(0, 133 - stats.totalEarnedCredits)}</span>
                  <span class="text-xs text-slate-400">นก.</span>
                </div>
                <div class="w-full bg-slate-100 h-1.5 rounded-full mt-3 overflow-hidden">
                  <div class="bg-emerald-500 h-full rounded-full" style="width: ${Math.min(100, (stats.totalEarnedCredits/133)*100)}%"></div>
                </div>
              </div>
              <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col justify-between">
                <span class="text-xs text-slate-500 font-medium">ประวัติเกรด F</span>
                <div class="mt-2 flex items-center gap-1.5">
                  ${stats.hasF 
                    ? '<span class="text-xs font-bold text-rose-600 flex items-center gap-1">⚠️ เคยติด F (งดเกียรตินิยม)</span>' 
                    : '<span class="text-xs font-bold text-emerald-600 flex items-center gap-1">✓ ปกติ (ไม่มีประวัติ)</span>'}
                </div>
                <p class="text-[9px] text-slate-400 mt-3">*เงื่อนไขห้ามติด F ตลอดหลักสูตร</p>
              </div>
            </div>

            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-4">
              <h3 class="text-sm font-bold text-slate-800 flex items-center gap-2">📂 หมวดวิชาหลักสูตร (133 นก.)</h3>
              <div class="space-y-3.5">
                <div>
                  <div class="flex justify-between text-xs text-slate-600 mb-1">
                    <span>1. หมวดศึกษาทั่วไป (GE)</span>
                    <span class="font-bold">${stats.geTotal}/33 นก.</span>
                  </div>
                  <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                    <div class="bg-teal-500 h-full" style="width: ${Math.min(100, (stats.geTotal/33)*100)}%"></div>
                  </div>
                </div>
                <div>
                  <div class="flex justify-between text-xs text-slate-600 mb-1">
                    <span>2. หมวดวิชาแกนหลักสาขา</span>
                    <span class="font-bold">${stats.core}/27 นก.</span>
                  </div>
                  <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                    <div class="bg-indigo-500 h-full" style="width: ${Math.min(100, (stats.core/27)*100)}%"></div>
                  </div>
                </div>
                <div>
                  <div class="flex justify-between text-xs text-slate-600 mb-1">
                    <span>3. หมวดวิชาชีพบังคับ (Compulsory)</span>
                    <span class="font-bold text-emerald-600">${stats.majorComp}/52 นก.</span>
                  </div>
                  <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                    <div class="bg-emerald-500 h-full" style="width: ${Math.min(100, (stats.majorComp/52)*100)}%"></div>
                  </div>
                </div>
              </div>
            </div>

            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
              <h3 class="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2">📈 กราฟแสดงแนวโน้มเกรดเฉลี่ยรายเทอม</h3>
              <div class="relative pt-2">
                <svg class="w-full h-32" viewBox="0 0 400 120">
                  <line x1="10" y1="20" x2="390" y2="20" stroke="#f1f5f9" stroke-width="1" />
                  <line x1="10" y1="50" x2="390" y2="50" stroke="#f1f5f9" stroke-width="1" />
                  <line x1="10" y1="80" x2="390" y2="80" stroke="#f1f5f9" stroke-width="1" />
                  <line x1="10" y1="110" x2="390" y2="110" stroke="#f1f5f9" stroke-width="1" />
                  
                  <path d="M 50 ${y1} L 130 ${y2} L 210 ${y3} L 290 ${y4}" fill="none" stroke="url(#gpaGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                  
                  <defs>
                    <linearGradient id="gpaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                      <stop offset="0%" stop-color="#10b981" />
                      <stop offset="100%" stop-color="#0d9488" />
                    </linearGradient>
                  </defs>

                  <g>
                    <circle cx="50" cy="${y1}" r="5" fill="#ffffff" stroke="#10b981" stroke-width="3" />
                    <text x="50" y="${y1 - 12}" text-anchor="middle" font-size="10" font-weight="bold" fill="#0f172a" class="font-inter">${gpa1}</text>
                    <text x="50" y="118" text-anchor="middle" font-size="8" fill="#64748b">1/1</text>
                  </g>
                  <g>
                    <circle cx="130" cy="${y2}" r="5" fill="#ffffff" stroke="#10b981" stroke-width="3" />
                    <text x="130" y="${y2 - 12}" text-anchor="middle" font-size="10" font-weight="bold" fill="#0f172a" class="font-inter">${gpa2}</text>
                    <text x="130" y="118" text-anchor="middle" font-size="8" fill="#64748b">1/2</text>
                  </g>
                  <g>
                    <circle cx="210" cy="${y3}" r="5" fill="#ffffff" stroke="#10b981" stroke-width="3" />
                    <text x="210" y="${y3 - 12}" text-anchor="middle" font-size="10" font-weight="bold" fill="#0f172a" class="font-inter">${gpa3}</text>
                    <text x="210" y="118" text-anchor="middle" font-size="8" fill="#64748b">2/1</text>
                  </g>
                  <g>
                    <circle cx="290" cy="${y4}" r="5" fill="#ffffff" stroke="#10b981" stroke-width="3" />
                    <text x="290" y="${y4 - 12}" text-anchor="middle" font-size="10" font-weight="bold" fill="#0f172a" class="font-inter">${gpa4}</text>
                    <text x="290" y="118" text-anchor="middle" font-size="8" fill="#64748b">2/2</text>
                  </g>
                </svg>
              </div>
            </div>
          </div>
        `;
      } 
      
      else if (activeTab === 'planner') {
        const terms = ['1/1', '1/2', '2/1', '2/2', '3/1', '3/2', '4/1', '4/2'];
        let termsHTML = '';

        terms.forEach(term => {
          const termCourses = courses.filter(c => c.term === term);
          const termGpa = calculateTermGPA(term);
          let coursesListHTML = '';

          if (termCourses.length === 0) {
            coursesListHTML = `<p class="text-xs text-slate-400 text-center py-4">ยังไม่มีวิชาเรียนในเทอมนี้</p>`;
          } else {
            termCourses.forEach(c => {
              coursesListHTML += `
                <div class="p-2 flex justify-between items-center gap-2">
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-1.5 mb-1">
                      <span class="text-[10px] font-mono bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded font-inter">${c.code}</span>
                      <span class="text-[9px] font-medium px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-600">${c.category}</span>
                    </div>
                    <p class="text-xs font-bold text-slate-700 truncate">${c.name}</p>
                    <p class="text-[10px] text-slate-400">${c.credits} หน่วยกิต</p>
                  </div>
                  <div class="flex items-center gap-3">
                    <span class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs font-inter bg-emerald-50 text-emerald-600">${c.grade}</span>
                    <div class="flex gap-1">
                      <button onclick="editCourse('${c.id}')" class="p-1 text-slate-400 hover:text-emerald-600">✎</button>
                      <button onclick="deleteCourse('${c.id}')" class="p-1 text-slate-400 hover:text-rose-600">🗑</button>
                    </div>
                  </div>
                </div>
              `;
            });
          }

          termsHTML += `
            <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden mb-3">
              <div class="bg-slate-50/80 px-4 py-3 flex justify-between items-center border-b border-slate-100">
                <h4 class="text-sm font-bold text-slate-700 font-inter">เทอม ${term}</h4>
                <span class="text-sm font-extrabold text-teal-600 font-inter">GPA: ${termGpa}</span>
              </div>
              <div class="p-2 divide-y divide-slate-50">${coursesListHTML}</div>
            </div>
          `;
        });

        main.innerHTML = `
          <div class="space-y-4 animate-fade-in">
            <div class="flex justify-between items-center">
              <h2 class="text-md font-bold text-slate-800">📖 เกรดและวิชาเรียนรายภาค</h2>
              <button onclick="openAddModal()" class="bg-emerald-600 text-white text-xs px-3 py-1.5 rounded-full font-semibold">+ เพิ่มวิชาเรียน</button>
            </div>
            <div>${termsHTML}</div>
          </div>
        `;
      } 
      
      else if (activeTab === 'curriculum') {
        let reqListHTML = '';
        MAJOR_COMPULSORY_REQUIREMENTS.forEach((req, idx) => {
          const matched = courses.find(c => c.code.toLowerCase() === req.code.toLowerCase());
          const isCompleted = matched && matched.grade !== 'F' && matched.grade !== 'W';

          reqListHTML += `
            <div class="p-3 rounded-2xl border flex justify-between items-center ${isCompleted ? 'bg-emerald-50/50 border-emerald-100' : 'bg-slate-50/50 border-slate-100'}">
              <div class="flex-1 min-w-0 pr-2">
                <p class="font-mono text-[9px] bg-slate-200 text-slate-700 px-1.5 py-0.5 rounded inline font-inter">${req.code}</p>
                <p class="text-xs font-bold text-slate-700 truncate mt-1">${req.name}</p>
              </div>
              <div>
                ${isCompleted 
                  ? `<div class="text-emerald-600 text-[10px] font-bold">✓ ผ่าน (${matched.grade})</div>`
                  : `<button onclick="quickAddCompulsory('${req.code}', '${req.name}', ${req.credits})" class="text-indigo-600 bg-white border border-indigo-100 px-2.5 py-1 rounded-full text-[10px] font-bold">+ เพิ่มเกรด</button>`
                }
              </div>
            </div>
          `;
        });

        main.innerHTML = `
          <div class="space-y-4 animate-fade-in">
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-4">
              <h3 class="text-sm font-bold text-slate-800">🎯 สถานะวิชาชีพบังคับ DDT (52 นก.)</h3>
              <div class="space-y-3">${reqListHTML}</div>
            </div>
          </div>
        `;
      } 
      
      else if (activeTab === 'settings') {
        main.innerHTML = `
          <div class="space-y-5 animate-fade-in">
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-4">
              <h3 class="text-sm font-bold text-slate-800">👤 ข้อมูลส่วนตัวจำลอง</h3>
              <div class="space-y-3">
                <div>
                  <label class="text-[10px] text-slate-400 block mb-1">รหัสนักศึกษา</label>
                  <input type="text" id="pref-id" value="${profile.studentId}" oninput="updateProfile()" class="w-full text-xs p-2.5 rounded-xl border border-slate-200 font-inter">
                </div>
                <div>
                  <label class="text-[10px] text-slate-400 block mb-1">Avatar URL</label>
                  <input type="text" id="pref-avatar" value="${profile.avatar}" oninput="updateProfile()" class="w-full text-xs p-2.5 rounded-xl border border-slate-200 font-inter">
                </div>
                <button onclick="localStorage.clear(); location.reload();" class="w-full py-2 bg-rose-600 text-white rounded-xl text-xs font-bold shadow-md hover:bg-rose-700">⚠️ ล้างข้อมูลเบราว์เซอร์ใหม่หมด (Reset App)</button>
              </div>
            </div>
          </div>
        `;
      }
    }

    function openAddModal() {
      document.getElementById('modal-title').textContent = 'เพิ่มวิชาเรียนใหม่';
      document.getElementById('form-course-id').value = '';
      document.getElementById('course-form').reset();
      document.getElementById('modal-container').classList.replace('hidden', 'flex');
    }

    function editCourse(id) {
      const c = courses.find(item => item.id === id);
      if (!c) return;
      document.getElementById('modal-title').textContent = 'แก้ไขข้อมูลวิชาเรียน';
      document.getElementById('form-course-id').value = c.id;
      document.getElementById('form-code').value = c.code;
      document.getElementById('form-name').value = c.name;
      document.getElementById('form-credits').value = c.credits;
      document.getElementById('form-grade').value = c.grade;
      document.getElementById('form-category').value = c.category;
      document.getElementById('form-term').value = c.term;
      document.getElementById('modal-container').classList.replace('hidden', 'flex');
    }

    function quickAddCompulsory(code, name, credits) {
      openAddModal();
      document.getElementById('form-code').value = code;
      document.getElementById('form-name').value = name;
      document.getElementById('form-credits').value = credits;
      document.getElementById('form-category').value = 'Major-Compulsory';
    }

    function closeModal() {
      document.getElementById('modal-container').classList.replace('flex', 'hidden');
    }

    function saveCourse(e) {
      e.preventDefault();
      const id = document.getElementById('form-course-id').value;
      const code = document.getElementById('form-code').value.toUpperCase();
      const name = document.getElementById('form-name').value;
      const credits = Number(document.getElementById('form-credits').value);
      const grade = document.getElementById('form-grade').value;
      const category = document.getElementById('form-category').value;
      const term = document.getElementById('form-term').value;

      if (id) {
        courses = courses.map(item => item.id === id ? { id, code, name, credits, grade, category, term } : item);
      } else {
        courses.push({ id: Date.now().toString(), code, name, credits, grade, category, term });
      }

      saveToLocalStorage();
      closeModal();
      renderContent();
    }

    function deleteCourse(id) {
      if (confirm('คุณต้องการลบรายวิชานี้?')) {
        courses = courses.filter(item => item.id !== id);
        saveToLocalStorage();
        renderContent();
      }
    }

    function updateProfile() {
      profile.studentId = document.getElementById('pref-id').value;
      profile.avatar = document.getElementById('pref-avatar').value;
      saveToLocalStorage();
      renderHeader();
    }

    const btnMobile = document.getElementById('btn-mobile');
    const btnFullscreen = document.getElementById('btn-fullscreen');
    const deviceWrapper = document.getElementById('device-wrapper');
    const statusBar = document.getElementById('status-bar');

    btnMobile.addEventListener('click', () => {
      btnMobile.className = "px-4 py-2 rounded-full text-xs font-bold transition flex items-center gap-2 shadow-md bg-emerald-600 text-white";
      btnFullscreen.className = "px-4 py-2 rounded-full text-xs font-bold transition flex items-center gap-2 shadow-md bg-slate-800 text-slate-400 hover:text-white";
      deviceWrapper.className = "transition-all duration-300 overflow-hidden w-[375px] h-[812px] bg-slate-950 rounded-[50px] border-[12px] border-slate-800 shadow-2xl relative flex flex-col";
      statusBar.classList.remove('hidden');
    });

    btnFullscreen.addEventListener('click', () => {
      btnFullscreen.className = "px-4 py-2 rounded-full text-xs font-bold transition flex items-center gap-2 shadow-md bg-emerald-600 text-white";
      btnMobile.className = "px-4 py-2 rounded-full text-xs font-bold transition flex items-center gap-2 shadow-md bg-slate-800 text-slate-400 hover:text-white";
      deviceWrapper.className = "transition-all duration-300 overflow-hidden w-full max-w-lg min-h-[600px] bg-slate-950 rounded-3xl shadow-xl flex flex-col p-2";
      statusBar.classList.add('hidden');
    });

    window.onload = function() {
      renderHeader();
      renderContent();
    };
  </script>
</body>
</html>
